services:
  db:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shortener
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shortener"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  app:
    build: .
    container_name: url-shortener
    ports:
      - "8080:8080"
    environment:
      STORAGE: postgres
      POSTGRES_DSN: postgres://user:pass@db:5432/shortener?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
